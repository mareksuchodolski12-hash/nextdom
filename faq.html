<script>window.PAGE_I18N={title:{nl:'FAQ',en:'FAQ'},lead:{nl:'Korte, eerlijke antwoorden op veelgestelde vragen.',en:'Short and honest answers to common questions.'},q1:{nl:'Wat is een Flat Pack woning?',en:'What is a Flat Pack house?'},a1:{nl:'Een woning die op locatie wordt opgebouwd uit prefab elementen met montage-instructie.',en:'A house assembled on site from prefabricated elements using an assembly manual.'},q2:{nl:'Wat bevat basic kit?',en:'What does the basic kit include?'},a2:{nl:'Onder meer SIP-panelen, C24-balken, ramen/deuren, membranen, dak/gevelmaterialen en montagematerialen.',en:'It includes SIP panels, C24 beams, windows/doors, membranes, roof/facade materials and assembly consumables.'},q3:{nl:'Is de woning woonklaar na levering?',en:'Is the house move-in ready after delivery?'},a3:{nl:'Niet volledig. Buitenafwerking is grotendeels voorzien; binnenafwerking loopt als aparte fase.',en:'Not fully. External finish is largely covered; interior fit-out is a separate phase.'},q4:{nl:'Zijn elektra en water standaard inbegrepen?',en:'Are electrical and plumbing included by default?'},a4:{nl:'Niet per definitie. Installaties worden vaak als aanvullende scope bepaald.',en:'Not necessarily. Installations are often defined as additional scope.'},q5:{nl:'Hoe lang duurt montage?',en:'How long does assembly take?'},a5:{nl:'Voor basic kit is ±12 werkdagen een gangbare indicatie.',en:'Around 12 working days is a common estimate for a basic kit.'},q6:{nl:'Is een kraan nodig?',en:'Is a crane required?'},a6:{nl:'Meestal niet nodig volgens systeeminformatie; zwaarste element is circa 70 kg.',en:'Usually not required according to system information; the heaviest element is around 70 kg.'},q7:{nl:'Welke fundering is nodig?',en:'Which foundation is needed?'},a7:{nl:'Vaak funderingsplaat, of SIP-vloer als optie. Definitieve keuze hangt af van project en bodem.',en:'Often a concrete slab, or SIP floor as option. Final choice depends on project and soil conditions.'},q8:{nl
