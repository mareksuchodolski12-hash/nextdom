<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NEXTDOM | Contact</title>
  <meta name="description" content="Neem contact op met NEXTDOM voor een gerichte Flat Pack offerteaanvraag in Nederland." />
  <link rel="canonical" href="https://nextdom.nl/contact" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<header><div class="container nav-wrap"><a class="logo" href="index.html?lang=nl">NEXTDOM<small>modular living NL</small></a><nav><ul><li><a href="index.html" data-nav-key="home"></a></li><li><a href="offer.html" data-nav-key="offer"></a></li><li><a href="technology.html" data-nav-key="technology"></a></li><li><a href="inspirations.html" data-nav-key="inspirations"></a></li><li><a href="about.html" data-nav-key="about"></a></li><li><a href="faq.html" data-nav-key="faq"></a></li><li><a href="contact.html" data-nav-key="contact"></a></li></ul></nav><div class="lang-switch"><button data-lang="nl">NL</button><button data-lang="en">EN</button></div></div></header>

<main>
<section class="page-head"><div class="container"><h1 data-i18n="title"></h1><p class="prose" data-i18n="lead"></p></div></section>

<section id="lead" class="anchor-offset">
  <div class="container grid-3">
    <article class="card">
      <h2 data-i18n="c1"></h2>
      <p class="small">Phone: [ +31 ... ]</p>
      <p class="small">Email: [ hello@nextdom.nl ]</p>
      <p class="small">WhatsApp: [ placeholder ]</p>
      <p class="small" data-i18n="hours"></p>
      <p class="small">Service area: Netherlands</p>
      <p class="small"><a href="privacy.html" data-localized-link data-i18n="privacyLink"></a></p>
    </article>

    <article class="card" style="grid-column: span 2;">
      <form id="lead-form" aria-label="Lead form">
        <div class="grid-3">
          <div><label data-i18n="f1" for="name"></label><input id="name" required name="name" autocomplete="name"></div>
          <div><label data-i18n="f2" for="email"></label><input id="email" required type="email" name="email" autocomplete="email"></div>
          <div><label data-i18n="f3" for="phone"></label><input id="phone" required name="phone" autocomplete="tel"></div>
        </div>

        <div class="grid-3">
          <div><label data-i18n="f4" for="country"></label><input id="country" name="country" value="Netherlands" required></div>
          <div><label data-i18n="f5" for="projectLocation"></label><input id="projectLocation" name="projectLocation" required></div>
          <div><label data-i18n="f6" for="selectedModel"></label><input id="selectedModel" name="selectedModel" required></div>
        </div>

        <div><label data-i18n="f7" for="plannedSize"></label><input id="plannedSize" name="plannedSize" required placeholder="e.g. 70 m²"></div>
        <div><label data-i18n="f8" for="message"></label><textarea id="message" rows="5" name="message" required></textarea></div>
        <div class="small"><input id="privacy" type="checkbox" required> <label for="privacy" style="display:inline;font-weight:400" data-i18n="privacy"></label></div>

        <button class="btn primary" type="submit" data-track="lead_submit" data-i18n="send"></button>
        <p id="form-success" class="notice" tabindex="-1" hidden data-i18n="success"></p>
      </form>
    </article>
  </div>
</section>
</main>

<footer><div class="container"><p data-i18n="footer1"></p><p data-i18n="footer2"></p></div></footer>

<script>
window.PAGE_I18N = {
  title: {

  },
  lead: {

  },
  c1: {
    nl: 'Direct contact',
    en: 'Direct contact'
  },
  hours: {

  },
  f1: {
    nl: 'Naam',
    en: 'Name'
  },
  f2: {

  },
  f3: {

  },
  f4: {

  },
  f5: {

    en: 'Project location'
  },
  f6: {
    nl: 'Geselecteerd model',
    en: 'Selected model'
  },
  f7: {

    en: 'Planned size'
  },
  f8: {
    nl: 'Bericht',
    en: 'Message'
  },
  privacy: {
    nl: 'Ik ga akkoord met verwerking van mijn gegevens voor deze aanvraag.',
